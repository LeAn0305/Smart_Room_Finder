<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Room Finder - AI Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0D9488;
            --primary-light: #CCFBF1;
            --bg-color: #F8FAFC;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --white: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --gradient: linear-gradient(135deg, #0D9488 0%, #3B82F6 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-primary);
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .chat-header {
            padding: 20px;
            background: var(--gradient);
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .chat-header h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 700;
        }

        .chat-header p {
            font-size: 12px;
            margin: 0;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 50% 50%, #f1f5f9 0%, transparent 100%);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            align-self: flex-start;
            background: var(--white);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: var(--white);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        }

        .input-area {
            padding: 16px;
            background: var(--white);
            border-top: 1px solid #F1F5F9;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #F1F5F9;
            border-radius: 25px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            background: #0F766E;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #F1F5F9;
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 12px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 10px 25px rgba(13, 148, 136, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fab:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .fab svg {
            width: 30px;
            height: 30px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 90;
            display: none;
        }
    </style>
</head>
<body>

    <div class="fab" onclick="toggleChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </div>

    <div class="overlay" id="overlay" onclick="toggleChat()"></div>

    <div class="chat-container" id="chatWindow" style="display: none; z-index: 100; position: fixed; bottom: 100px; right: 30px;">
        <div class="chat-header">
            <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/>
                </svg>
            </div>
            <div>
                <h1>Trợ lý AI</h1>
                <p>Smart Room Finder Assistant</p>
            </div>
        </div>
        <div class="messages" id="messages">
            <div class="message bot-message">
                Xin chào! Tôi là trợ lý AI của Smart Room Finder. Tôi có thể giúp gì cho bạn?
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const chatWindow = document.getElementById('chatWindow');
        const overlay = document.getElementById('overlay');

        function toggleChat() {
            if (chatWindow.style.display === 'none') {
                chatWindow.style.display = 'flex';
                overlay.style.display = 'block';
                userInput.focus();
            } else {
                chatWindow.style.display = 'none';
                overlay.style.display = 'none';
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, 'user');
            userInput.value = '';

            // Loading indicator
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Simulate bot response
            setTimeout(() => {
                document.getElementById('typing').remove();
                addMessage("Tôi đang tìm kiếm các giải pháp tốt nhất cho yêu cầu của bạn: '" + text + "'. Tuy nhiên, để nhận phản hồi từ AI thực, bạn cần cấu hình API Key trong ứng dụng Flutter.", 'bot');
            }, 1500);
        }

        function addMessage(text, side) {
            const msg = document.createElement('div');
            msg.className = `message ${side}-message`;
            msg.innerText = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Show chat by default for demo
        setTimeout(toggleChat, 500);
    </script>
</body>
</html>
